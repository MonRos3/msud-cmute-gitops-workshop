apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paper-server
  namespace: argocd
spec:
  project: default
  source:
    # Replace <MonRos3> with your GitHub username.
    repoURL: https://github.com/monros3/msud-cmute-gitops-workshop.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: paper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
